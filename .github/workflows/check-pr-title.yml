name: Check PR title

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]
    branches: [develop]

jobs:
  check_title:
    if: ${{ github.event.pull_request.draft != true }}
    uses: XRPLF/actions/.github/workflows/check-pr-title.yml@f9c2b57a7ac30d70555b5de6e627005f62e933f3
